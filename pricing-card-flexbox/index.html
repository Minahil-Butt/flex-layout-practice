<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        box-sizing: border-box;
        padding: 0;
        margin: 0;
        font-family: Arial, sans-serif;
      }

      body {
        background-color: white;
        color: rgb(54, 54, 54);
        min-height: 100vh;
        padding: 20px;
      }
      .flexcontainer {
        display: flex;
        justify-content: center;
        align-items: center;
        flex-wrap: wrap; /* ✅ Allows items to wrap */
        background-color: bisque;
        gap: 20px;
        width: 90vw; /* ✅ Makes it adapt to screen width */
        max-width: 1200px; /* ✅ Prevents it from becoming too large */
        padding: 30px;
        border-radius: 10px;
      }

      .flexitem {
        background-color: aquamarine;
        height: auto;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: center;
        border: 2px solid purple;
        border-radius: 10px;
        padding: 20px;
        box-shadow: 4px 4px 10px rgba(0, 0, 0, 0.2);
        transition: transform 0.3s ease-in-out, box-shadow 0.3s ease-in-out;
        text-align: center;
        min-width: 220px; /* ✅ Ensures minimum width */
        max-width: 280px; /* ✅ Prevents oversized cards */
      }

      .flexitem:hover {
        transform: scale(1.05);
        box-shadow: 6px 6px 15px rgba(0, 0, 0, 0.3);
      }

      .cardtitle h3 {
        color: darkblue;
        margin-bottom: 5px;
      }

      .cardtitle h4 {
        color: darkred;
        font-size: 18px;
        margin-bottom: 10px;
      }

      .features ul {
        list-style: none;
        padding: 0;
      }

      .features ul li {
        margin: 5px 0;
        font-size: 14px;
      }

      .foot button {
        background-color: purple;
        color: white;
        border: none;
        padding: 10px 15px;
        cursor: pointer;
        border-radius: 5px;
        font-size: 16px;
        transition: background-color 0.3s ease-in-out;
      }

      .foot button:hover {
        background-color: darkviolet;
      }
    </style>
  </head>
  <body>
    <div class="flexcontainer">
      <div class="flexitem">
        <div class="cardtitle">
          <h3>⭐BASIC PLAN</h3>
          <h4>$5 / month</h4>
        </div>
        <div class="features">
          <ul>
            <li>✅ Feature 1</li>
            <li>✅ Feature 2</li>
            <li>✅ Feature 3</li>
          </ul>
        </div>
        <div class="foot">
          <button>Subscribe</button>
        </div>
      </div>

      <div class="flexitem">
        <div class="cardtitle">
          <h3>⭐PRO PLAN</h3>
          <h4>$55 / month</h4>
        </div>
        <div class="features">
          <ul>
            <li>✅ Feature 1</li>
            <li>✅ Feature 2</li>
            <li>✅ Feature 3</li>
          </ul>
        </div>
        <div class="foot">
          <button>Subscribe</button>
        </div>
      </div>

      <div class="flexitem">
        <div class="cardtitle">
          <h3>PREMIMUM PLAN</h3>
          <h4>$99 / month</h4>
        </div>
        <div class="features">
          <ul>
            <li>✅ Feature 1</li>
            <li>✅ Feature 2</li>
            <li>✅ Feature 3</li>
          </ul>
        </div>
        <div class="foot">
          <button>Subscribe</button>
        </div>
      </div>
    </div>
